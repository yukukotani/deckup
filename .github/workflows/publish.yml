name: Publish Packages

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - run: corepack enable

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec vp run ready

      - name: Publish to npm
        run: >-
          pnpm
          --filter @deckup/theme-default
          --filter @deckup/theme-bold
          --filter @deckup/theme-minimal
          --filter @deckup/theme-apple-basic
          --filter @deckup/theme-google-basic
          --filter @deckup/core
          --filter @deckup/astro
          --filter @deckup/cli
          -r publish --access public --no-git-checks
