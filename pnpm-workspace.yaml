packages:
  - apps/*
  - example
  - packages/*
  - tools/*

catalogMode: prefer

catalog:
  "@astrojs/markdown-remark": ^7.2.0
  "@astrojs/mdx": ^7.0.0
  "@astrojs/starlight": ^0.41.2
  "@puppeteer/browsers": latest
  "@tailwindcss/vite": latest
  "@types/node": ^24
  astro: ^7.0.4
  gunshi: latest
  jiti: ^2.7.0
  playwright-core: latest
  shiki: ^4.3.0
  tailwindcss: latest
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@0.2.2
  vitest: 4.1.9
  vite-plus: latest
overrides:
  vite: "npm:@voidzero-dev/vite-plus-core@0.2.2"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
allowBuilds:
  esbuild: true
  sharp: true
